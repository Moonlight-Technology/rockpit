name: Build And Deploy RockPit

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main-vps
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_latest: ${{ steps.vars.outputs.image_latest }}
      image_sha: ${{ steps.vars.outputs.image_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Derive image tags
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | awk -F/ '{print $2}')
          IMAGE_BASE="ghcr.io/${OWNER_LC}/${REPO_NAME}"
          echo "image_latest=${IMAGE_BASE}:latest" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_latest }}
            ${{ steps.vars.outputs.image_sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/opt/rockpit"
            fi

            mkdir -p "$APP_DIR"

            cat > "$APP_DIR/docker-compose.prod.yml" <<COMPOSE
            services:
              rockpit:
                container_name: rockpit-app
                image: ${{ needs.build.outputs.image_sha }}
                restart: unless-stopped
                env_file:
                  - $APP_DIR/.env.production
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                ports:
                  - "3020:3000"
            COMPOSE

            docker compose -f "$APP_DIR/docker-compose.prod.yml" pull
            docker compose -f "$APP_DIR/docker-compose.prod.yml" up -d --remove-orphans
            docker image prune -f
            docker compose -f "$APP_DIR/docker-compose.prod.yml" ps
